name: InkyPi
version: "1.0.0"
slug: inkypi
description: "E-Ink display manager for Raspberry Pi - display weather, calendars, clocks, news, AI-generated images, and more on your e-ink screen"
arch:
  - aarch64
  - armv7
url: "https://github.com/fatihak/InkyPi"
startup: application
boot: auto
init: false
ingress: true
ingress_port: 0
panel_icon: mdi:image-multiple-outline
panel_title: InkyPi
map:
  - type: config
    read_only: false
  - type: data
    read_only: false
options:
  display_type: "mock"
  display_width: 800
  display_height: 480
  waveshare_device: ""
schema:
  display_type: "list(mock|inky)?"
  display_width: "int"
  display_height: "int"
  waveshare_device: "str?"
full_access: true
