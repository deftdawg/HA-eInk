name: InkyPi
version: "1.0.0"
slug: inkypi
description: "E-Ink display manager for Raspberry Pi - display weather, calendars, clocks, news, AI-generated images, and more on your e-ink screen"
arch:
  - aarch64
  - armv7
icon: mdi:image-multiple-outline
url: "https://github.com/fatihak/InkyPi"
webui: "http://[HOST]:[PORT:80]/"
startup: application
boot: auto
init: false
ingress: true
ingress_port: 8099
panel_icon: mdi:image-multiple-outline
panel_title: InkyPi
ports:
  80/tcp: 8180
ports_description:
  80/tcp: "InkyPi Web UI"
map:
  - type: config
    read_only: false
  - type: data
    read_only: false
options:
  display_type: "mock"
  display_resolution:
    - 800
    - 480
  waveshare_device: ""
schema:
  display_type: "list(mock|inky)?"
  display_resolution:
    - "int"
    - "int"
  waveshare_device: "str?"
full_access: true
